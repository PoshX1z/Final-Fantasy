<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Main crystal gradient -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"></stop>
      <stop offset="35%" stop-color="#7dd3fc"></stop>
      <stop offset="70%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#0b1026"></stop>
    </linearGradient>

    <!-- Inner light -->
    <radialGradient id="core" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="40%" stop-color="#bae6fd"></stop>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Edge shine -->
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.2"></stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs>

  <!-- Outer glow aura -->
  <polygon points="256,30 395,185 340,455 172,455 117,185" fill="#38bdf8" opacity="0.25" filter="url(#glow)"></polygon>

  <!-- Main crystal body -->
  <polygon points="256,40 385,185 335,445 177,445 127,185" fill="url(#g1)"></polygon>

  <!-- Inner light core -->
  <polygon points="256,110 320,200 295,380 217,380 192,200" fill="url(#core)" opacity="0.9"></polygon>

  <!-- Facet panels -->
  <polygon points="256,40 256,445 177,445 127,185" fill="#0ea5e9" opacity="0.25"></polygon>

  <polygon points="256,40 385,185 335,445 256,445" fill="#bfdbfe" opacity="0.25"></polygon>

  <polygon points="127,185 256,150 385,185 256,210" fill="#e0f2fe" opacity="0.35"></polygon>

  <!-- Sharp highlight edges -->
  <polyline points="256,40 385,185 335,445" stroke="url(#edge)" stroke-width="3" fill="none"></polyline>

  <polyline points="256,40 127,185 177,445" stroke="#e0f2ff" stroke-opacity="0.4" stroke-width="2" fill="none"></polyline>

  <!-- Spark highlights -->
  <circle cx="300" cy="150" r="4" fill="white" opacity="0.9"></circle>
  <circle cx="220" cy="220" r="3" fill="white" opacity="0.7"></circle>
  <circle cx="280" cy="300" r="3" fill="white" opacity="0.6"></circle>

</svg>