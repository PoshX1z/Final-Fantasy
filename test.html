<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    /* Container to simulate the dark space background */
    body {
      background-color: #050b14;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    /* --- THE GLOWING BORDER EFFECT --- */
    .glow-search-container {
      display: flex;
      align-items: center;
      width: 600px;
      height: 55px;
      padding: 0 10px 0 25px;
      border: 2px solid #82b1ff;

      /* Dark background to contrast the heavy light */
      background-color: #050b16;

      /* 2. The Heavy Multi-Layered Glow */
      box-shadow: 
    /* --- OUTSET SHADOWS (Spilling outward) --- */
        0 0 10px #2979ff,
        /* Tight, intense outer core */ 0 0 25px #2962ff,
        /* Mid-range vibrant glow */ 0 0 50px #1565c0,
        /* Wide, softer outer spread */ 0 0 90px rgba(13, 71, 161, 0.6),
        /* Very wide, ambient background light */
        /* --- INSET SHADOWS (Spilling inward) --- */ inset 0 0 15px #2979ff,
        /* Bright inner reflection */ inset 0 0 30px rgba(41, 98, 255, 0.5); /* Deep inner ambient fill */
    }

    /* Input Styling */
    .glow-search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    .glow-search-input::placeholder {
      color: #8fa3c0;
    }

    /* Search Button Styling */
    .glow-search-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2b58c4 0%, #152d70 100%);
      border: 1.5px solid rgba(100, 180, 255, 0.7);
      box-shadow:
        0 0 8px rgba(50, 150, 255, 0.6),
        inset 0 0 8px rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
    }

    .glow-search-button svg {
      width: 20px;
      height: 20px;
    }

    .glow-search-button:hover {
      box-shadow:
        0 0 15px rgba(100, 180, 255, 0.8),
        inset 0 0 10px rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
  </style>
  <body>
    <div class="glow-search-container">
      <input
        type="text"
        class="glow-search-input"
        placeholder="Search games and products..."
      />

      <button class="glow-search-button">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
  </body>
</html>
